server:
  port: ${LIBROS_PORT:8083}

spring:
  application:
    name: servicio-libros
  datasource:
    url: ${ORACLE_JDBC_URL}
    username: ${ORACLE_APP_USER:${ORACLE_USERNAME}}
    password: ${ORACLE_APP_PASSWORD:${ORACLE_PASSWORD}}
    driver-class-name: oracle.jdbc.OracleDriver
  jpa:
    hibernate:
      ddl-auto: none
    properties:
      hibernate:
        dialect: org.hibernate.dialect.OracleDialect
        format_sql: true
    show-sql: false

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics

logging:
  level:
    root: ${LOG_LEVEL_ROOT:INFO}
    com.biblioteca.libros: ${LOG_LEVEL_APP:INFO}
