services:
  servicio-libros:
    build:
      context: ./servicio-libros
    environment:
      LIBROS_PORT: 8083
      ORACLE_JDBC_URL: ${ORACLE_JDBC_URL}
      ORACLE_APP_USER: ${ORACLE_APP_USER}
      ORACLE_APP_PASSWORD: ${ORACLE_APP_PASSWORD}
      LOG_LEVEL_ROOT: ${LOG_LEVEL_ROOT:-INFO}
      LOG_LEVEL_APP: ${LOG_LEVEL_APP:-INFO}
    ports:
      - "${LIBROS_PORT:-8083}:8083"





  bff-springboot:
    build:
      context: ./bff-springboot
    environment:
      BFF_PORT: 8080
      USUARIOS_FUNCTION_BASE_URL: ${USUARIOS_FUNCTION_BASE_URL}
      PRESTAMOS_FUNCTION_BASE_URL: ${PRESTAMOS_FUNCTION_BASE_URL}
      LIBROS_SERVICE_BASE_URL: http://servicio-libros:8083/api
      BFF_DOWNSTREAM_CONNECT_TIMEOUT: ${BFF_DOWNSTREAM_CONNECT_TIMEOUT:-5s}
      BFF_DOWNSTREAM_READ_TIMEOUT: ${BFF_DOWNSTREAM_READ_TIMEOUT:-60s}
      LOG_LEVEL_ROOT: ${LOG_LEVEL_ROOT:-INFO}
      LOG_LEVEL_APP: ${LOG_LEVEL_APP:-INFO}
    depends_on:
      servicio-libros:
        condition: service_started
    ports:
      - "${BFF_PORT:-8080}:8080"
